<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ゴールドジム MAP（東京・神奈川・千葉・埼玉）</title>
  <meta name="description" content="東京・神奈川・千葉・埼玉のゴールドジム全店舗を地図で探せるアプリ" />

  <!-- Leaflet（地図ライブラリ・無料/APIキー不要） -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark">GOLD'S</span>
      <h1>ゴールドジム MAP</h1>
    </div>
    <div class="header-controls">
      <a class="nav-link" href="zone.html">⏱ 15分圏マップ →</a>
      <input type="search" id="search" placeholder="店名・エリアで絞り込み…" autocomplete="off" />
      <label class="toggle">
        <input type="checkbox" id="filter24h" />
        <span>24時間営業のみ</span>
      </label>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div id="pref-tabs" class="pref-tabs"></div>
      <div class="sidebar-head">
        <span id="count">--</span> 店舗
      </div>
      <ul id="gym-list" class="gym-list"></ul>
    </aside>
    <div id="map" class="map"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
